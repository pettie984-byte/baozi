<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>團購下單網</title>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #f39c12;
            --background-color: #fcf8f2;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 120px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
            font-size: 2.2em;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        .status-banner {
            background-color: #fdf5ec;
            border: 1px solid #f3d9c2;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.95em;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85em;
            color: white;
            margin-bottom: 8px;
        }

        .status-badge.loading { background-color: #95a5a6; }
        .status-badge.active { background-color: #2ecc71; }
        .status-badge.closed { background-color: #e74c3c; }
        .status-badge.upcoming { background-color: #f1c40f; color: #2c3e50; }

        .status-text { line-height: 1.6; }
        .deadline-highlight { color: #e67e22; font-weight: bold; }
        .section-title {
            font-size: 1.2em;
            color: var(--primary-color);
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
            margin: 25px 0 15px 0;
        }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fdf5ec;
            color: var(--primary-color);
        }

        .qty-input {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .price-tag { color: #c0392b; font-weight: bold; }
        .summary-box {
            background-color: #fdf5ec;
            border: 1px dashed var(--secondary-color);
            padding: 20px;
            border-radius: 8px;
            text-align: right;
            font-size: 1.2em;
            margin-bottom: 25px;
        }

        .total-amount { color: #d35400; font-weight: bold; font-size: 1.5em; }
        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button.submit-btn:hover { background-color: #d35400; }
        button.submit-btn:disabled { background-color: #bdc3c7; cursor: not-allowed; }

        /* 📱 懸浮總金額小視窗 */
        .floating-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #e67e22 !important;
            color: white !important;
            padding: 12px 20px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 99999 !important;
            display: none;
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            cursor: pointer;
            border: 2px solid white;
            max-width: 250px;
            transition: transform 0.2s, background-color 0.3s, opacity 0.3s ease, visibility 0.3s;
        }

        .floating-counter:hover {
            background-color: #d35400 !important;
            transform: scale(1.03);
        }

        .float-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            justify-content: space-between;
        }

        .floating-counter .badge {
            background-color: white;
            color: #e67e22;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .float-details {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 6px;
            width: 100%;
            text-align: left;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }

        /* 彈出視窗 (Modal) */
        .modal {
            display: none;
            position: fixed;
            z-index: 100000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: left;
        }

        .modal-header {
            font-size: 1.5em;
            color: #2ecc71;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-body {
            font-size: 1em;
            line-height: 1.6;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .modal-body ul { padding-left: 20px; margin: 10px 0; }
        .modal-total {
            font-size: 1.3em;
            color: #c0392b;
            font-weight: bold;
            text-align: right;
            margin-top: 10px;
        }

        .close-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .close-btn:hover { background-color: #d35400; }

        @media (max-width: 600px) {
            th, td { padding: 8px 4px; font-size: 0.85em; }
            td:nth-child(1) { font-weight: bold; }
            td:nth-child(2) {
                font-size: 0.75em !important; 
                min-width: 45px;
                max-width: 60px;
                color: #7f8c8d;
            }
            td:nth-child(3) { min-width: 70px; white-space: nowrap; }
            td:nth-child(4) { min-width: 60px; text-align: center; }
            .qty-input { width: 50px; padding: 4px; font-size: 0.9em; }
            .floating-counter {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                font-size: 0.9em;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

<div id="floating-widget" class="floating-counter" onclick="scrollToSubmit()">
    <div class="float-header">
        <span>已選 <span id="float-qty" class="badge">0</span> 個品項</span>
        <span>共 NT$ <span id="float-price">0</span></span>
    </div>
    <div id="float-details-list" class="float-details"></div>
</div>

<div class="container">
    <h1 id="main-title">團購下單網</h1>
    <p class="subtitle">
        團購名稱：<span id="shop-name">載入中...</span><br>
        填妥下方數量後即可送出訂單。
    </p>

    <div class="status-banner">
        <span id="groupbuy-badge" class="status-badge loading">讀取中...</span>
        <div id="groupbuy-message" class="status-text">正在讀取雲端最新商品與開團時程，請稍候...</div>
    </div>

    <form id="orderForm" onsubmit="submitOrder(event)">
        <div class="section-title">Step 1. 填寫訂購人資訊</div>
        <div class="form-group">
            <label for="name">訂購人姓名 *</label>
            <input type="text" id="name" required placeholder="請輸入您的姓名" disabled>
        </div>

        <div class="section-title">Step 2. 選擇商品數量</div>
        <table>
            <thead>
                <tr>
                    <th>商品名稱</th>
                    <th>規格</th>
                    <th>價格</th>
                    <th style="text-align: center;">數量</th>
                </tr>
            </thead>
            <tbody id="product-list">
                </tbody>
        </table>

        <div id="submit-section" class="section-title">Step 3. 確認並送出</div>
        <div class="summary-box">
            總計共 <span id="total-qty">0</span> 件商品，
            應付總金額：<span class="total-amount">NT$ <span id="total-price">0</span></span>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>確認送出訂單</button>
    </form>
</div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">🎉 訂單送出成功！</div>
        <div class="modal-body">
            <p><strong>訂購人：</strong> <span id="confirm-name"></span></p>
            <p><strong>訂購品項明細：</strong></p>
            <ul id="confirm-details"></ul>
            <div class="modal-total">
                共 <span id="confirm-qty" style="color:#2c3e50;"></span> 件商品，總金額：NT$ <span id="confirm-price"></span> 元
            </div>
        </div>
        <button class="close-btn" onclick="closeModal()">好的，我知道了</button>
    </div>
</div>

<script>
    // 🔗 請換成您在 GAS 部署產生的 Web App URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNzVDCMRqfKxsOs1fS4IpVYARVtUrn9Z2Q9hfnfD-ydQYoxcv9V4Iw33Pgfmu_r9bAzA/exec";

    let products = [];
    let isGroupBuyActive = false;

    // 1. 網頁載入時取得資料
    fetch(GAS_WEB_APP_URL, {
        method: "GET",
        mode: "cors"
    })
    .then(response => {
        if (!response.ok) throw new Error("HTTP 錯誤狀態碼：" + response.status);
        return response.json();
    })
    .then(data => {
        if (data.result === 'success') {
            products = data.products;
            isGroupBuyActive = data.isActive;
            
            document.getElementById('shop-name').innerText = data.groupName + "。";
            renderProducts(products);
            updateUIStatus(data.startDate, data.endDate, data.isActive, data.status);
        } else {
            showErrorStatus("無法取得團購資料，主揪後端訊息：" + (data.message || "未知原因"));
        }
    })
    .catch(error => {
        console.error("Fetch Error:", error);
        showErrorStatus("網路連線失敗，無法取得團購時程。");
    });

    // 2. 動態渲染商品
    function renderProducts(productList) {
        const tbody = document.getElementById('product-list');
        tbody.innerHTML = '';
        
        productList.forEach((prod, index) => {
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><strong>${prod.name}</strong></td>
                <td style="font-size:0.85em; color:#7f8c8d;">${prod.spec}</td>
                <td class="price-tag">NT$ ${prod.price}</td>
                <td style="text-align: center;">
                    <input type="number" class="qty-input" id="qty-${index}" min="0" value="0" oninput="calculateTotal()" disabled>
                </td>
            `;
            tbody.appendChild(row);
        });
    }

    // 3. 更新介面狀態
    function updateUIStatus(startDate, endDate, isActive, calculatedStatus) {
        const badge = document.getElementById('groupbuy-badge');
        const msg = document.getElementById('groupbuy-message');
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('name');
        const qtyInputs = document.querySelectorAll('.qty-input');

        if (calculatedStatus === "尚未開始") {
            badge.className = "status-badge upcoming";
            badge.innerText = "尚未開始";
            msg.innerHTML = `本團預計開團時間為：${startDate} ～ 截止時間為：${endDate}。<br>目前尚未開放填單！`;
            
            nameInput.disabled = true;
            submitBtn.disabled = true;
            submitBtn.innerText = "團購尚未開始";
            qtyInputs.forEach(input => input.disabled = true);
            document.getElementById('floating-widget').style.display = 'none';

        } else if (isActive) {
            badge.className = "status-badge active";
            badge.innerText = "進行中";
            msg.innerHTML = `本團開團時間：${startDate} ～ 截止時間：<span class="deadline-highlight">${endDate}</span>。<br>想訂購的朋友請抓緊時間填單唷！`;
            
            nameInput.disabled = false;
            submitBtn.disabled = false;
            submitBtn.innerText = "確認送出訂單";
            qtyInputs.forEach(input => input.disabled = false);
            document.getElementById('floating-widget').style.display = 'flex';
        } else {
            badge.className = "status-badge closed";
            badge.innerText = "已結束";
            msg.innerHTML = `<strong>本團已截止收單！截止日為：${endDate}</strong>。<br><span style="color: #c0392b;">主揪已正式向店家下單，請靜候通知。</span>`;
            
            nameInput.disabled = true;
            submitBtn.disabled = true;
            submitBtn.innerText = "團購已結束，暫停收單";
            qtyInputs.forEach(input => input.disabled = true);
            document.getElementById('floating-widget').style.display = 'none';
        }
    }

    function showErrorStatus(errMsg) {
        const badge = document.getElementById('groupbuy-badge');
        const msg = document.getElementById('groupbuy-message');
        badge.className = "status-badge closed";
        badge.innerText = "讀取失敗";
        msg.innerHTML = `<span style="color: #c0392b;">${errMsg}</span>`;
    }

    // 4. 計算合計
    function calculateTotal() {
        let totalQty = 0;
        let totalPrice = 0;
        let selectedDetails = [];

        products.forEach((prod, index) => {
            const qtyInput = document.getElementById(`qty-${index}`);
            const qty = parseInt(qtyInput.value) || 0;
            if (qty < 0) {
                qtyInput.value = 0;
                return;
            }
            if (qty > 0) {
                totalQty += qty;
                totalPrice += qty * prod.price;
                selectedDetails.push(`${prod.name} (${prod.spec}) x ${qty}`);
            }
        });

        document.getElementById('total-qty').innerText = totalQty;
        document.getElementById('total-price').innerText = totalPrice.toLocaleString();
        document.getElementById('float-qty').innerText = totalQty;
        document.getElementById('float-price').innerText = totalPrice.toLocaleString();

        const floatDetailsList = document.getElementById('float-details-list');
        if (selectedDetails.length > 0) {
            floatDetailsList.innerHTML = selectedDetails.join('<br>');
            floatDetailsList.style.display = 'block';
        } else {
            floatDetailsList.innerHTML = '';
            floatDetailsList.style.display = 'none';
        }
    }

    function scrollToSubmit() {
        if (!isGroupBuyActive) return;
        document.getElementById('submit-section').scrollIntoView({ behavior: 'smooth' });
    }

    // 5. 🚀 傳送訂單（發送純 JSON 格式，搭配後端完美對接）
    function submitOrder(event) {
        event.preventDefault();

        const name = document.getElementById('name').value.trim();
        if (!name) {
            alert('請輸入訂購人姓名！');
            return;
        }

        let selectedItems = [];
        let totalQty = 0;
        let totalPrice = 0;

        products.forEach((prod, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                totalQty += qty;
                totalPrice += qty * prod.price;
                selectedItems.push({
                    name: prod.name,
                    spec: prod.spec,
                    qty: qty,
                    price: prod.price,
                    subtotal: qty * prod.price
                });
            }
        });

        if (selectedItems.length === 0) {
            alert('請至少選擇一樣商品數量！');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = '正在傳送訂單，請稍候...';

        // 封裝成 JSON 結構
        const payload = {
            name: name,
            totalQty: totalQty,
            totalPrice: totalPrice,
            items: selectedItems
        };

        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: {
                'Content-Type': 'text/plain;charset=utf-8' // 💡 使用 text/plain 避免複雜的 CORS Preflight 預檢請求
            }
        })
        .then(response => {
            if (!response.ok) throw new Error("伺服器回傳錯誤: " + response.status);
            return response.json();
        })
        .then(data => {
            if (data.result === 'success') {
                showSuccessModal(name);
                resetForm();
            } else {
                alert('失敗：' + data.message);
            }
        })
        .catch(error => {
            console.error('Submit Error:', error);
            // 💡 備用安全提醒
            alert('傳送發生異常，請向主揪確認後台是否已成功存入資料。');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = '確認送出訂單';
        });
    }

    function showSuccessModal(orderName) {
        document.getElementById('confirm-name').innerText = orderName;
        const detailsList = document.getElementById('confirm-details');
        detailsList.innerHTML = '';
        
        let totalQty = 0;
        let totalPrice = 0;

        products.forEach((prod, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                totalQty += qty;
                totalPrice += qty * prod.price;
                const li = document.createElement('li');
                li.innerHTML = `<strong>${prod.name}</strong> (${prod.spec}) x <span style="color:#e67e22; font-weight:bold;">${qty}</span>`;
                detailsList.appendChild(li);
            }
        });

        document.getElementById('confirm-qty').innerText = totalQty;
        document.getElementById('confirm-price').innerText = totalPrice.toLocaleString();
        document.getElementById('successModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }

    function resetForm() {
        document.getElementById('name').value = '';
        products.forEach((_, index) => {
            document.getElementById(`qty-${index}`).value = 0;
        });
        calculateTotal();
    }
</script>

</body>
</html>
