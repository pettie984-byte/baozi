<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包子饅頭 - 團購下單系統</title>
    <style>
        :root {
            --primary-color: #e67e22;
            --secondary-color: #f39c12;
            --background-color: #fcf8f2;
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Helvetica Neue', Arial, 'Noto Sans TC', sans-serif;
            background-color: var(--background-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            padding-bottom: 120px; /* 留白避免內容被底部懸浮條遮擋 */
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 5px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 20px;
            font-size: 0.95em;
            line-height: 1.6;
        }

        /* 📣 團購狀態公告欄樣式 */
        .status-banner {
            background-color: #fdf5ec;
            border: 1px solid #f3d9c2;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 0.95em;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 0.85em;
            color: white;
            margin-bottom: 8px;
        }

        /* 讀取中（灰色） */
        .status-badge.loading {
            background-color: #95a5a6;
        }

        /* 進行中（綠色） */
        .status-badge.active {
            background-color: #2ecc71;
        }

        /* 已結束（紅色） */
        .status-badge.closed {
            background-color: #e74c3c;
        }

        .status-text {
            line-height: 1.6;
        }

        .deadline-highlight {
            color: #e67e22;
            font-weight: bold;
        }

        .section-title {
            font-size: 1.2em;
            color: var(--primary-color);
            border-left: 5px solid var(--primary-color);
            padding-left: 10px;
            margin: 25px 0 15px 0;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
        }

        th, td {
            padding: 12px 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background-color: #fdf5ec;
            color: var(--primary-color);
        }

        .qty-input {
            width: 60px;
            padding: 6px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .price-tag {
            color: #c0392b;
            font-weight: bold;
        }

        .summary-box {
            background-color: #fdf5ec;
            border: 1px dashed var(--secondary-color);
            padding: 20px;
            border-radius: 8px;
            text-align: right;
            font-size: 1.2em;
            margin-bottom: 25px;
        }

        .total-amount {
            color: #d35400;
            font-weight: bold;
            font-size: 1.5em;
        }

        button.submit-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        button.submit-btn:hover {
            background-color: #d35400;
        }

        button.submit-btn:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        /* 📱 懸浮總金額小視窗 */
        .floating-counter {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #e67e22 !important;
            color: white !important;
            padding: 12px 20px;
            border-radius: 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            z-index: 99999 !important;
            display: none; /* 預設先隱藏，等確認進行中才顯示 */
            flex-direction: column;
            align-items: flex-end;
            gap: 6px;
            cursor: pointer;
            border: 2px solid white;
            max-width: 250px;
            transition: transform 0.2s, background-color 0.3s, opacity 0.3s ease, visibility 0.3s;
        }

        .floating-counter:hover {
            background-color: #d35400 !important;
            transform: scale(1.03);
        }

        .float-header {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.1em;
            font-weight: bold;
            width: 100%;
            justify-content: space-between;
        }

        .floating-counter .badge {
            background-color: white;
            color: #e67e22;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
        }

        .float-details {
            font-size: 0.75em;
            color: rgba(255, 255, 255, 0.9);
            border-top: 1px solid rgba(255, 255, 255, 0.3);
            padding-top: 6px;
            width: 100%;
            text-align: left;
            line-height: 1.4;
            max-height: 120px;
            overflow-y: auto;
            display: none;
        }

        /* 彈出視窗 (Modal) 樣式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 100000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            text-align: left;
        }

        .modal-header {
            font-size: 1.5em;
            color: #2ecc71;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-body {
            font-size: 1em;
            line-height: 1.6;
            border-top: 1px solid #eee;
            border-bottom: 1px solid #eee;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .modal-body ul {
            padding-left: 20px;
            margin: 10px 0;
        }

        .modal-total {
            font-size: 1.3em;
            color: #c0392b;
            font-weight: bold;
            text-align: right;
            margin-top: 10px;
        }

        .close-btn {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1em;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
        }

        .close-btn:hover {
            background-color: #d35400;
        }

        /* 📱 手機板版面微調 */
        @media (max-width: 600px) {
            th, td {
                padding: 8px 4px; 
                font-size: 0.85em;
            }
            td:nth-child(1) {
                font-weight: bold;
            }
            td:nth-child(2) {
                font-size: 0.75em !important; 
                min-width: 45px;
                max-width: 60px;
                color: #7f8c8d;
            }
            td:nth-child(3) {
                min-width: 70px;
                white-space: nowrap;
            }
            td:nth-child(4) {
                min-width: 60px;
                text-align: center;
            }
            .qty-input {
                width: 50px;
                padding: 4px;
                font-size: 0.9em;
            }
            .floating-counter {
                bottom: 20px;
                right: 20px;
                padding: 10px 15px;
                font-size: 0.9em;
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

<div id="floating-widget" class="floating-counter" onclick="scrollToSubmit()">
    <div class="float-header">
        <span>已選 <span id="float-qty" class="badge">0</span> 包</span>
        <span>共 NT$ <span id="float-price">0</span></span>
    </div>
    <div id="float-details-list" class="float-details"></div>
</div>

<div class="container">
    <h1>手工包子饅頭團購單</h1>
    <p class="subtitle">
        店名：鄉品包子。<br>
        填妥下方數量後即可送出訂單。
    </p>

    <div class="status-banner">
        <span id="groupbuy-badge" class="status-badge loading">讀取中...</span>
        <div id="groupbuy-message" class="status-text">正在讀取雲端最新團購時程，請稍候...</div>
    </div>

    <form id="orderForm" onsubmit="submitOrder(event)">
        <div class="section-title">Step 1. 填寫訂購人資訊</div>
        <div class="form-group">
            <label for="name">訂購人姓名 *</label>
            <input type="text" id="name" required placeholder="請輸入您的姓名" disabled>
        </div>

        <div class="section-title">Step 2. 選擇商品數量</div>
        <table>
            <thead>
                <tr>
                    <th>商品名稱</th>
                    <th>規格</th>
                    <th>價格</th>
                    <th style="text-align: center;">數量 (包)</th>
                </tr>
            </thead>
            <tbody id="product-list">
            </tbody>
        </table>

        <div id="submit-section" class="section-title">Step 3. 確認並送出</div>
        <div class="summary-box">
            總計共 <span id="total-qty">0</span> 包，
            應付總金額：<span class="total-amount">NT$ <span id="total-price">0</span></span>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn" disabled>確認送出訂單</button>
    </form>
</div>

<div id="successModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">🎉 訂單送出成功！</div>
        <div class="modal-body">
            <p><strong>訂購人：</strong> <span id="confirm-name"></span></p>
            <p><strong>訂購品項明細：</strong></p>
            <ul id="confirm-details"></ul>
            <div class="modal-total">
                共 <span id="confirm-qty" style="color:#2c3e50;"></span> 包，總金額：NT$ <span id="confirm-price"></span> 元
            </div>
        </div>
        <button class="close-btn" onclick="closeModal()">好的，我知道了</button>
    </div>
</div>

<script>
    // 🔗 GAS 雲端 API 網址
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxNzVDCMRqfKxsOs1fS4IpVYARVtUrn9Z2Q9hfnfD-ydQYoxcv9V4Iw33Pgfmu_r9bAzA/exec";

    // 商品清單
    const products = [
        { name: "鄉品鮮肉包", spec: "(5顆)", price: 125 },
        { name: "酸菜鮮肉包", spec: "(5顆)", price: 150 },
        { name: "竹筍鮮肉包", spec: "(5顆)", price: 150 },
        { name: "香菇高麗菜包", spec: "(5顆)", price: 125 },
        { name: "紅豆包", spec: "(5顆)", price: 125 },
        { name: "芝麻包", spec: "(5顆)", price: 150 },
        { name: "紅豆起司包", spec: "(5顆)", price: 150 },
        { name: "白玉饅頭", spec: "(5顆)", price: 75 },
        { name: "黑糖饅頭", spec: "(5顆)", price: 75 },
        { name: "無糖饅頭", spec: "(5顆)", price: 75 },
        { name: "全麥饅頭", spec: "(5顆)", price: 75 },
        { name: "芝麻饅頭", spec: "(5顆)", price: 90 },
        { name: "抹茶紅豆饅頭", spec: "(5顆)", price: 125 },
        { name: "五穀雜糧饅頭", spec: "(5顆)", price: 150 },
        { name: "雙料起司卷", spec: "(5顆)", price: 150 },
        { name: "五穀雜糧小饅頭", spec: "(10顆)", price: 65 },
        { name: "小饅頭", spec: "(10顆)", price: 50 }
    ];

    let isGroupBuyActive = false; // 由 API 動態判定

    // 1. 網頁載入時，先渲染商品欄位（預設全部鎖定）
    const tbody = document.getElementById('product-list');
    products.forEach((prod, index) => {
        const row = document.createElement('tr');
        row.innerHTML = `
            <td><strong>${prod.name}</strong></td>
            <td style="font-size:0.85em; color:#7f8c8d;">${prod.spec}</td>
            <td class="price-tag">NT$ ${prod.price}</td>
            <td style="text-align: center;">
                <input type="number" class="qty-input" id="qty-${index}" min="0" value="0" onchange="calculateTotal()" disabled>
            </td>
        `;
        tbody.appendChild(row);
    });

    // 2. 向 GAS 請求試算表中的「開團日期」與狀態
    fetch(GAS_WEB_APP_URL)
    .then(response => response.json())
    .then(data => {
        if (data.result === 'success') {
            isGroupBuyActive = data.isActive;
            updateUIStatus(data.startDate, data.endDate, data.isActive);
        } else {
            showErrorStatus("無法取得團購日期，請聯絡主揪。");
        }
    })
    .catch(error => {
        console.error("Fetch Error:", error);
        showErrorStatus("網路連線失敗，無法取得團購時程。");
    });

    // 3. 根據雲端抓到的日期與狀態更新 UI
    function updateUIStatus(startDate, endDate, isActive) {
        const badge = document.getElementById('groupbuy-badge');
        const msg = document.getElementById('groupbuy-message');
        const submitBtn = document.getElementById('submitBtn');
        const nameInput = document.getElementById('name');
        const qtyInputs = document.querySelectorAll('.qty-input');

        if (isActive) {
            // 🥳 進行中
            badge.className = "status-badge active";
            badge.innerText = "進行中";
            msg.innerHTML = `本團開團時間：${startDate} ～ 截止到期日：<span class="deadline-highlight">${endDate}</span>。<br>想吃的朋友請抓緊時間填單唷！`;
            
            // 解鎖輸入元件
            nameInput.disabled = false;
            nameInput.placeholder = "請輸入您的姓名";
            submitBtn.disabled = false;
            submitBtn.innerText = "確認送出訂單";
            qtyInputs.forEach(input => input.disabled = false);

            // 顯示右下角懸浮視窗
            document.getElementById('floating-widget').style.display = 'flex';
        } else {
            // 🚫 已截止 / 尚未開始
            badge.className = "status-badge closed";
            badge.innerText = "已結束（已下單）";
            msg.innerHTML = `<strong>本團已截止收單！到期日為：${endDate}</strong>。<br><span style="color: #c0392b;">主揪已正式向店家下單，請靜候取貨通知。</span>`;
            
            // 保持鎖定
            nameInput.disabled = true;
            nameInput.placeholder = "團購已截止，不開放填寫";
            submitBtn.disabled = true;
            submitBtn.innerText = "團購已結束，暫停收單";
            qtyInputs.forEach(input => input.disabled = true);
            
            // 隱藏右下角懸浮視窗
            document.getElementById('floating-widget').style.display = 'none';
        }
    }

    function showErrorStatus(errMsg) {
        const badge = document.getElementById('groupbuy-badge');
        const msg = document.getElementById('groupbuy-message');
        badge.className = "status-badge closed";
        badge.innerText = "讀取失敗";
        msg.innerHTML = `<span style="color: #c0392b;">${errMsg}</span>`;
    }

    function scrollToSubmit() {
        if (!isGroupBuyActive) return;
        document.getElementById('submit-section').scrollIntoView({ behavior: 'smooth' });
    }

    // 監聽滾動事件
    window.onscroll = function() {
        if (!isGroupBuyActive) return;

        const widget = document.getElementById('floating-widget');
        const scrollPosition = window.innerHeight + window.pageYOffset;
        const totalHeight = document.documentElement.offsetHeight;
        
        if (totalHeight - scrollPosition < 80) {
            widget.style.opacity = "0";
            widget.style.visibility = "hidden";
        } else {
            widget.style.opacity = "1";
            widget.style.visibility = "visible";
        }
    };

    // 計算總計
    function calculateTotal() {
        let totalQty = 0;
        let totalPrice = 0;
        let selectedItemsHtml = "";

        products.forEach((prod, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                totalQty += qty;
                totalPrice += qty * prod.price;
                selectedItemsHtml += `<div>${prod.name} x ${qty}</div>`;
            }
        });
        
        document.getElementById('total-qty').innerText = totalQty;
        document.getElementById('total-price').innerText = totalPrice;

        document.getElementById('float-qty').innerText = totalQty;
        document.getElementById('float-price').innerText = totalPrice;

        const detailsContainer = document.getElementById('float-details-list');
        if (totalQty > 0) {
            detailsContainer.innerHTML = selectedItemsHtml;
            detailsContainer.style.display = "block";
        } else {
            detailsContainer.innerHTML = "";
            detailsContainer.style.display = "none";
        }
    }

    function submitOrder(event) {
        event.preventDefault();

        if (!isGroupBuyActive) {
            alert('本團購已經結束，無法再送出訂單！');
            return;
        }

        const name = document.getElementById('name').value;
        let orderDetails = [];
        let totalQty = 0;
        let totalPrice = 0;

        products.forEach((prod, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value) || 0;
            if (qty > 0) {
                orderDetails.push(`${prod.name} x ${qty}包`);
                totalQty += qty;
                totalPrice += qty * prod.price;
            }
        });

        if (totalQty === 0) {
            alert('請至少選擇一項商品再進行下單！');
            return;
        }

        const submitBtn = document.getElementById('submitBtn');
        submitBtn.disabled = true;
        submitBtn.innerText = "訂單傳送中，請稍候...";

        // 這裡維持您原本傳送資料庫的欄位格式
        const payload = {
            name: name,
            details: orderDetails.join('、\n'),
            totalQty: totalQty,
            totalPrice: totalPrice
        };

        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: {
                'Content-Type': 'text/plain;charset=utf-8'
            }
        })
        .then(response => response.json())
        .then(data => {
            if (data.result === 'success') {
                document.getElementById('confirm-name').innerText = name;
                document.getElementById('confirm-qty').innerText = totalQty;
                document.getElementById('confirm-price').innerText = totalPrice;
                
                const detailsUl = document.getElementById('confirm-details');
                detailsUl.innerHTML = '';
                orderDetails.forEach(item => {
                    const li = document.createElement('li');
                    li.innerText = item;
                    detailsUl.appendChild(li);
                });

                document.getElementById('successModal').style.display = 'flex';

                document.getElementById('orderForm').reset();
                calculateTotal();
            } else {
                alert('寫入失敗，請聯絡主揪！錯誤原因：' + data.message);
            }
        })
        .catch(error => {
            console.error('Error:', error);
            alert('連線失敗，請確認 GAS 部署設定是否設為「任何人」都可以存取。');
        })
        .finally(() => {
            submitBtn.disabled = false;
            submitBtn.innerText = "確認送出訂單";
        });
    }

    function closeModal() {
        document.getElementById('successModal').style.display = 'none';
    }
</script>

</body>
</html>
