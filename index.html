<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>團購下單網</title>

<style>

:root{
    --primary-color:#e67e22;
    --secondary-color:#f39c12;
    --background-color:#fcf8f2;
    --text-color:#2c3e50;
}

body{
    font-family:'Helvetica Neue',Arial,'Noto Sans TC',sans-serif;
    background-color:var(--background-color);
    color:var(--text-color);
    margin:0;
    padding:20px;
    padding-bottom:120px;
}

.container{
    max-width:800px;
    margin:0 auto;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 4px 15px rgba(0,0,0,.05);
}

h1{
    text-align:center;
    color:var(--primary-color);
    margin-bottom:5px;
    font-size:2.2em;
}

.subtitle{
    text-align:center;
    color:#7f8c8d;
    margin-bottom:20px;
    font-size:.95em;
    line-height:1.6;
}

.status-banner{
    background-color:#fdf5ec;
    border:1px solid #f3d9c2;
    border-radius:8px;
    padding:15px;
    margin-bottom:30px;
    text-align:center;
    font-size:.95em;
}

.status-badge{
    display:inline-block;
    padding:4px 12px;
    border-radius:12px;
    font-weight:bold;
    font-size:.85em;
    color:#fff;
    margin-bottom:8px;
}

.status-badge.loading{
    background-color:#95a5a6;
}

.status-badge.active{
    background-color:#2ecc71;
}

.status-badge.closed{
    background-color:#e74c3c;
}

.status-badge.upcoming{
    background-color:#f1c40f;
    color:#2c3e50;
}

.section-title{
    font-size:1.2em;
    color:var(--primary-color);
    border-left:5px solid var(--primary-color);
    padding-left:10px;
    margin:25px 0 15px;
}

.form-group{
    margin-bottom:15px;
}

label{
    display:block;
    margin-bottom:5px;
    font-weight:bold;
}

input[type="text"]{
    width:100%;
    padding:10px;
    border:1px solid #ddd;
    border-radius:6px;
    box-sizing:border-box;
    font-size:1em;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-bottom:25px;
}

th,td{
    padding:12px 10px;
    text-align:left;
    border-bottom:1px solid #eee;
}

th{
    background-color:#fdf5ec;
    color:var(--primary-color);
}

/* 🟢 加減按鈕控制組 */
.qty-control {
    display: inline-flex;
    align-items: center;
    border: 1px solid #ccc;
    border-radius: 6px;
    overflow: hidden;
    background: #fff;
    width: 110px;
    height: 34px;
}

.qty-btn {
    width: 32px;
    height: 100%;
    background: #fdf5ec;
    border: none;
    color: var(--primary-color);
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
}

.qty-btn:active {
    background: #f3d9c2;
}

.qty-btn:disabled {
    background: #eee;
    color: #999;
    cursor: not-allowed;
}

/* 🟢 優化後的手機純數字輸入框（無微調箭頭，不變形） */
.qty-input{
    width: 46px;
    height: 100%;
    border: none;
    border-left: 1px solid #eee;
    border-right: 1px solid #eee;
    text-align: center;
    font-size: 1em;
    font-weight: bold;
    color: var(--text-color);
    padding: 0;
    box-sizing: border-box;
    background: #fff;
}

.qty-input:focus {
    outline: none;
}

.price-tag{
    color:#c0392b;
    font-weight:bold;
}

.summary-box{
    background-color:#fdf5ec;
    border:1px dashed var(--secondary-color);
    padding:20px;
    border-radius:8px;
    text-align:right;
    font-size:1.2em;
    margin-bottom:25px;
}

.total-amount{
    color:#d35400;
    font-weight:bold;
    font-size:1.5em;
}

button.submit-btn{
    background-color:var(--primary-color);
    color:#fff;
    border:none;
    padding:15px 30px;
    font-size:1.1em;
    border-radius:8px;
    cursor:pointer;
    width:100%;
}

button.submit-btn:hover{
    background-color:#d35400;
}

button.submit-btn:disabled{
    background-color:#bdc3c7;
    cursor:not-allowed;
}

/* 浮動視窗 */

.floating-counter{
    position:fixed;
    bottom:30px;
    right:30px;
    background:#e67e22;
    color:#fff;
    padding:12px 20px;
    border-radius:18px;
    box-shadow:0 4px 20px rgba(0,0,0,.3);
    z-index:99999;
    display:none;
    flex-direction:column;
    gap:6px;
    border:2px solid white;
    max-width:250px;
}

.float-header{
    display:flex;
    justify-content:space-between;
    gap:10px;
    font-weight:bold;
}

.badge{
    background:#fff;
    color:#e67e22;
    padding:2px 8px;
    border-radius:20px;
}

.float-details{
    font-size:.75em;
    border-top:1px solid rgba(255,255,255,.3);
    padding-top:6px;
    display:none;
    line-height:1.4;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    z-index:100000;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.5);
    justify-content:center;
    align-items:center;
}

.modal-content{
    background:#fff;
    padding:30px;
    border-radius:12px;
    max-width:500px;
    width:90%;
}

.modal-header{
    font-size:1.5em;
    color:#2ecc71;
    font-weight:bold;
    margin-bottom:15px;
    text-align:center;
}

.modal-body-content {
    font-size: 1em;
    line-height: 1.6;
}

.modal-body-content ul {
    padding-left: 20px;
    margin: 10px 0;
}

.modal-total{
    font-size:1.3em;
    color:#c0392b;
    font-weight:bold;
    text-align:right;
    margin-top:10px;
}

.close-btn{
    background-color:var(--primary-color);
    color:#fff;
    border:none;
    padding:10px 20px;
    font-size:1em;
    border-radius:6px;
    cursor:pointer;
    width:100%;
}

/* 手機版排版微調，避免欄位擠壓變形 */
@media (max-width: 600px) {
    th, td {
        padding: 8px 4px;
        font-size: 0.9em;
    }
    .qty-control {
        width: 100px;
        height: 30px;
    }
    .qty-btn {
        width: 28px;
    }
    .qty-input {
        width: 44px;
    }
}

</style>
</head>

<body>

<div id="floating-widget" class="floating-counter">

    <div class="float-header">
        <span>
            已選
            <span id="float-qty" class="badge">0</span>
            個品項
        </span>

        <span>
            NT$
            <span id="float-price">0</span>
        </span>
    </div>

    <div id="float-details-list" class="float-details"></div>

</div>

<div class="container">

    <h1>團購下單網</h1>

    <p class="subtitle">
        團購名稱：
        <span id="shop-name">載入中...</span>
    </p>

    <div class="status-banner">

        <span id="groupbuy-badge" class="status-badge loading">
            讀取中...
        </span>

        <div id="groupbuy-message">
            正在讀取資料...
        </div>

    </div>

    <form id="orderForm">

        <div class="section-title">
            Step 1. 填寫訂購人資訊
        </div>

        <div class="form-group">

            <label>訂購人姓名 *</label>

            <input
                type="text"
                id="name"
                placeholder="請輸入姓名"
                disabled
            >

        </div>

        <div class="section-title">
            Step 2. 選擇商品
        </div>

        <table>

            <thead>

                <tr>
                    <th>商品</th>
                    <th>規格</th>
                    <th>價格</th>
                    <th>數量</th>
                </tr>

            </thead>

            <tbody id="product-list"></tbody>

        </table>

        <div class="summary-box">

            共
            <span id="total-qty">0</span>
            件商品

            <br><br>

            總金額：

            <span class="total-amount">
                NT$
                <span id="total-price">0</span>
            </span>

        </div>

        <button
            type="submit"
            id="submitBtn"
            class="submit-btn"
            disabled
        >
            確認送出訂單
        </button>

    </form>

</div>

<div id="successModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">
            🎉 訂單送出成功
        </div>

        <div class="modal-body-content">

            <p>
                訂購人：
                <span id="confirm-name" style="font-weight: bold;"></span>
            </p>

            <p>訂購細節：</p>
            <ul id="confirm-details"></ul>

            <div class="modal-total">

                共
                <span id="confirm-qty">0</span>
                件

                <br>

                NT$
                <span id="confirm-price">0</span>

            </div>

        </div>

        <br>

        <button
            class="close-btn"
            onclick="closeModal()"
        >
            好的
        </button>

    </div>

</div>

<script>

// =========================================
// 改成你的 GAS 網址
// =========================================

const GAS_WEB_APP_URL =
"https://script.google.com/macros/s/AKfycbxNzVDCMRqfKxsOs1fS4IpVYARVtUrn9Z2Q9hfnfD-ydQYoxcv9V4Iw33Pgfmu_r9bAzA/exec";


// =========================================

let products = [];

let isGroupBuyActive = false;


// 初始化
loadData();


// =========================================
// 載入商品
// =========================================

function loadData(){

    fetch(GAS_WEB_APP_URL)

    .then(response => response.json())

    .then(data => {

        console.log(data);

        if(data.result !== "success"){

            throw new Error(data.message);

        }

        products = data.products || [];

        isGroupBuyActive = data.isActive;

        document.getElementById("shop-name")
            .innerText = data.groupName;

        renderProducts();

        updateUIStatus(
            data.startDate,
            data.endDate,
            data.isActive,
            data.status
        );

    })

    .catch(err => {

        console.error(err);

        document.getElementById("groupbuy-message")
            .innerHTML =
            "<span style='color:red'>讀取失敗</span>";

    });

}


// =========================================
// 顯示商品（加入 + 與 - 按鈕元件）
// =========================================

function renderProducts(){

    const tbody =
        document.getElementById("product-list");

    tbody.innerHTML = "";

    products.forEach((prod,index)=>{

        const row = document.createElement("tr");

        row.innerHTML = `

            <td>
                <strong>${prod.name}</strong>
            </td>

            <td>
                ${prod.spec || ""}
            </td>

            <td class="price-tag">
                NT$ ${prod.price}
            </td>

            <td>
                <div class="qty-control">
                    <button type="button" class="qty-btn dec-btn" onclick="changeQty(${index}, -1)" disabled>-</button>
                    <input
                        type="text"
                        inputmode="decimal"
                        pattern="[0-9]*"
                        value="0"
                        class="qty-input"
                        id="qty-${index}"
                        oninput="validateAndCalculate(${index})"
                        disabled
                    >
                    <button type="button" class="qty-btn inc-btn" onclick="changeQty(${index}, 1)" disabled>+</button>
                </div>
            </td>

        `;

        tbody.appendChild(row);

    });

}


// =========================================
// 🟢 加減按鈕控制函式
// =========================================

function changeQty(index, change) {
    if (!isGroupBuyActive) return;
    const input = document.getElementById(`qty-${index}`);
    let currentVal = parseInt(input.value) || 0;
    let newVal = currentVal + change;
    if (newVal < 0) newVal = 0;
    input.value = newVal;
    calculateTotal();
}


// =========================================
// 🟢 手動輸入防呆與即時試算
// =========================================

function validateAndCalculate(index) {
    const input = document.getElementById(`qty-${index}`);
    // 只保留數字，過濾掉英文字母或小數點，防止手機輸入法bug
    input.value = input.value.replace(/[^0-9]/g, '');
    if (input.value === "") {
        // 空白時先不要強行帶入 0，方便使用者打字，但計算時當作 0
    }
    calculateTotal();
}


// =========================================
// 更新狀態（一併控制按鈕開關）
// =========================================

function updateUIStatus(
    startDate,
    endDate,
    isActive,
    status
){

    const badge =
        document.getElementById("groupbuy-badge");

    const msg =
        document.getElementById("groupbuy-message");

    const submitBtn =
        document.getElementById("submitBtn");

    const nameInput =
        document.getElementById("name");

    const qtyInputs =
        document.querySelectorAll(".qty-input");
        
    const qtyBtns = 
        document.querySelectorAll(".qty-btn");

    if(status === "尚未開始"){

        badge.className =
            "status-badge upcoming";

        badge.innerText =
            "尚未開始";

        msg.innerHTML =
            `開始時間：${startDate}`;

    }
    else if(isActive){

        badge.className =
            "status-badge active";

        badge.innerText =
            "進行中";

        msg.innerHTML =
            `截止時間：${endDate}`;

        nameInput.disabled = false;

        submitBtn.disabled = false;

        qtyInputs.forEach(
            input => input.disabled = false
        );
        
        qtyBtns.forEach(
            btn => btn.disabled = false
        );

        document.getElementById(
            "floating-widget"
        ).style.display = "flex";

    }
    else{

        badge.className =
            "status-badge closed";

        badge.innerText =
            "已結束";

        msg.innerHTML =
            `本團已截止`;

    }

}


// =========================================
// 計算總價（已加入「懸浮視窗規格」顯示）
// =========================================

function calculateTotal(){

    let totalQty = 0;

    let totalPrice = 0;

    let selectedDetails = [];

    products.forEach((prod,index)=>{

        const qty =
            parseInt(
                document.getElementById(
                    `qty-${index}`
                ).value
            ) || 0;

        if(qty > 0){

            totalQty += qty;

            totalPrice += qty * prod.price;

            const displayName = prod.spec ? `${prod.name} (${prod.spec})` : prod.name;
            selectedDetails.push(
                `${displayName} x ${qty}`
            );

        }

    });

    document.getElementById(
        "total-qty"
    ).innerText = totalQty;

    document.getElementById(
        "total-price"
    ).innerText =
        totalPrice.toLocaleString();

    document.getElementById(
        "float-qty"
    ).innerText = totalQty;

    document.getElementById(
        "float-price"
    ).innerText =
        totalPrice.toLocaleString();

    const detailBox =
        document.getElementById(
            "float-details-list"
        );

    if(selectedDetails.length > 0){

        detailBox.innerHTML =
            selectedDetails.join("<br>");

        detailBox.style.display =
            "block";

    }else{

        detailBox.style.display =
            "none";

    }

}


// =========================================
// 送出訂單
// =========================================

document
.getElementById("orderForm")
.addEventListener(
    "submit",
    submitOrder
);

function submitOrder(event){

    event.preventDefault();

    const name =
        document.getElementById("name")
        .value
        .trim();

    if(!name){

        alert("請輸入姓名");

        return;

    }

    let items = [];

    let totalQty = 0;

    let totalPrice = 0;

    products.forEach((prod,index)=>{

        const qty =
            parseInt(
                document.getElementById(
                    `qty-${index}`
                ).value
            ) || 0;

        if(qty > 0){

            const subtotal =
                qty * prod.price;

            items.push({

                name: prod.name,

                spec: prod.spec || "",

                qty: qty,

                price: prod.price,

                subtotal: subtotal

            });

            totalQty += qty;

            totalPrice += subtotal;

        }

    });

    if(items.length === 0){

        alert("請至少選一項商品");

        return;

    }

    const submitBtn =
        document.getElementById(
            "submitBtn"
        );

    submitBtn.disabled = true;

    submitBtn.innerText =
        "送出中...";

    const payload = {

        name: name,

        totalQty: totalQty,

        totalPrice: totalPrice,

        items: items

    };

    console.log(payload);

    fetch(GAS_WEB_APP_URL,{

        method:"POST",

        headers:{
            "Content-Type":
            "text/plain;charset=utf-8"
        },

        body: JSON.stringify(payload)

    })

    .then(response => response.text())

    .then(text => {

        console.log(text);

        showSuccessModal(name);

        resetForm();

    })

    .catch(err => {

        console.error(err);

        showSuccessModal(name);

        resetForm();

    })

    .finally(()=>{

        submitBtn.disabled = false;

        submitBtn.innerText =
            "確認送出訂單";

    });

}


// =========================================
// 成功視窗
// =========================================

function showSuccessModal(name){

    document.getElementById(
        "confirm-name"
    ).innerText = name;

    const details =
        document.getElementById(
            "confirm-details"
        );

    details.innerHTML = "";

    let totalQty = 0;

    let totalPrice = 0;

    products.forEach((prod,index)=>{

        const qty =
            parseInt(
                document.getElementById(
                    `qty-${index}`
                ).value
            ) || 0;

        if(qty > 0){

            totalQty += qty;

            totalPrice += qty * prod.price;

            const li =
                document.createElement("li");

            const displayName = prod.spec ? `${prod.name} (${prod.spec})` : prod.name;

            li.innerHTML =
                `<strong>${displayName}</strong> x <span style="color:#e67e22; font-weight:bold;">${qty}</span>`;

            details.appendChild(li);

        }

    });

    document.getElementById(
        "confirm-qty"
    ).innerText = totalQty;

    document.getElementById(
        "confirm-price"
    ).innerText =
        totalPrice.toLocaleString();

    document.getElementById(
        "successModal"
    ).style.display = "flex";

}


// =========================================

function closeModal(){

    document.getElementById(
        "successModal"
    ).style.display = "none";

}


// =========================================

function resetForm(){

    document.getElementById(
        "name"
    ).value = "";

    products.forEach((p,index)=>{

        document.getElementById(
            `qty-${index}`
        ).value = 0;

    });

    calculateTotal();

}

</script>

</body>
</html>
